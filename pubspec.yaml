name: suan
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
    
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.7.0
  firebase_storage: ^12.4.10
  cupertino_icons: ^1.0.6
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  # UI & Navigation
  go_router: ^12.1.3
  curved_navigation_bar: ^1.0.3
  
  # Audio & Prononciation
  just_audio: ^0.9.36
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  
  # Camera & Recognition
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  file_picker: ^8.3.7
  tflite_flutter: ^0.10.4
  image: ^4.1.7
  
  # Animation & Gamification
  lottie: ^2.7.0
  confetti: ^0.7.0
  
  # Networking
  http: ^1.1.0
  connectivity_plus: ^5.0.1
  
  # Storage & Database
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # Google Fonts
  google_fonts: ^6.1.0
  flutter_dotenv: ^5.0.2
  video_player: ^2.11.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - .env
    - assets/images/baoule/masques/masque_goli.jpg
    - assets/images/baoule/masques/masque_kpan_pre.jpg
    - assets/images/baoule/textiles/pagne_geometrique.jpg
    - assets/images/baoule/textiles/parure_ceremonielle.jpg
    - assets/icons/
    - assets/animations/
    - assets/audio/
    - assets/videos/
    - assets/models/mobilenet_v2.tflite
    - assets/models/labels.txt
